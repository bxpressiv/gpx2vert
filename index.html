<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="utf-8">
    <title>mkUltra.run gpx2vert analyser</title>
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: auto; color: #333; }
        #output { margin-top: 20px; padding: 15px; border: 1px solid #ccc; background: #f9f9f9; border-radius: 4px; }
        input { margin: 10px 0; padding: 10px; border: 1px solid #ddd; border-radius: 4px; width: 100%; box-sizing: border-box; }
        h1 { border-bottom: 2px solid #333; padding-bottom: 10px; }
        .stat-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee; }
        .stat-label { font-weight: bold; }
        py-config { display: none !important; }
    </style>
</head>
<body>
    <h1>mkUltra.run gpx2vert analyser</h1>
    <p>Upload a GPX file for impact-based elevation analysis:</p>
    <input type="file" id="file-upload" accept=".gpx">
    <div id="output">Initialising mkUltra engine...</div>

    <py-config>
        packages = ["pandas", "gpxpy"]
    </py-config>

    <script type="py">
        from pyscript import display, when
        import gpxpy
        import pandas as pd

        display("✅ mkUltra engine ready.", target="output")

        @when("change", "#file-upload")
        async def process_file(event):
            file_list = event.target.files
            if not file_list: return
            
            display("⏳ Processing vertical data...", target="output")
            file = file_list.item(0)
            array_buf = await file.arrayBuffer()
            content = array_buf.to_bytes()
            
            try:
                gpx_data = content.decode("utf-8")
                gpx = gpxpy.parse(gpx_data)
                track_name = gpx.tracks[0].name if gpx.tracks else "Unnamed Track"
                
                points = []
                for track in gpx.tracks:
                    for segment in track.segments:
                        for point in segment.points:
                            points.append({'ele': point.elevation})
                
                df = pd.DataFrame(points)
                
                # Apply initial smoothing to reduce GPS noise
                df['ele_smoothed'] = df['ele'].rolling(window=5, center=True).mean()
                df['diff'] = df['ele_smoothed'].diff()
                
                gain = df[df['diff'] > 0]['diff'].sum()
                loss = df[df['diff'] < 0]['diff'].sum()

                html_results = f"""
                    <div style='margin-bottom:10px;'><strong>File:</strong> {track_name}</div>
                    <div class='stat-row'><span class='stat-label'>Total Ascent:</span> <span>{gain:.0f}m</span></div>
                    <div class='stat-row'><span class='stat-label'>Total Descent:</span> <span>{abs(loss):.0f}m</span></div>
                    <div style='margin-top:10px; font-size: 0.8em; color: #666;'>*Calculated using a 5-point moving average.</div>
                """
                
                output_div = document.getElementById("output")
                output_div.innerHTML = html_results
                
            except Exception as e:
                display(f"❌ Error: {str(e)}", target="output")
    </script>
</body>
</html>
